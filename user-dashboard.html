<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard User - Desa Kalemago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">
  <nav class="bg-emerald-800 text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <img src="fotokkn/logokabposo.png" alt="Logo" class="w-14 h-14 object-contain">
          <div>
            <h1 class="font-bold text-2xl">Dashboard User</h1>
            <p class="text-emerald-300 text-sm">Desa Kalemago</p>
          </div>
        </div>
        
        <div class="flex items-center gap-4">
          <div class="text-right hidden md:block">
            <p class="font-semibold" id="userName">Loading...</p>
            <p class="text-emerald-300 text-xs" id="userRole">USER</p>
          </div>
          <button onclick="logout()" class="bg-emerald-700 hover:bg-red-600 px-5 py-2.5 rounded-2xl text-sm font-medium transition flex items-center gap-2">
            <i class="fas fa-sign-out-alt"></i>
            <span class="hidden md:inline">Logout</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="bg-gradient-to-r from-emerald-700 to-emerald-600 rounded-3xl p-8 text-white mb-8 shadow-xl">
      <h2 class="text-4xl font-bold mb-2">Selamat Datang! 👋</h2>
      <p class="text-emerald-200 text-lg" id="welcomeMessage">Memuat...</p>
    </div>

    <!-- VISITOR STATS -->
    <div class="bg-white rounded-3xl shadow-lg p-8">
      <h3 class="text-2xl font-bold text-emerald-800 mb-6 flex items-center gap-3">
        <i class="fas fa-chart-line text-emerald-600"></i>
        Statistik Pengunjung
      </h3>
      
      <div class="grid md:grid-cols-3 gap-6">
        <div class="bg-emerald-50 rounded-2xl p-6 text-center">
          <p class="text-6xl font-extrabold text-emerald-800" id="totalVisitors">0</p>
          <p class="text-emerald-600 font-semibold mt-2">Total Pengunjung</p>
        </div>
        
        <div class="bg-blue-50 rounded-2xl p-6 text-center">
          <p class="text-6xl font-extrabold text-blue-800" id="todayVisitors">0</p>
          <p class="text-blue-600 font-semibold mt-2">Pengunjung Hari Ini</p>
        </div>
        
        <div class="bg-purple-50 rounded-2xl p-6 text-center">
          <p class="text-6xl font-extrabold text-purple-800" id="onlineVisitors">12</p>
          <p class="text-purple-600 font-semibold mt-2">Sedang Online</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://desakalemago2-backend-production.up.railway.app';

    async function checkAuth() {
      const userStr = localStorage.getItem('user');
      if (!userStr) { window.location.href = 'login.html'; return; }
      
      const user = JSON.parse(userStr);
      
      // REDIRECT BERDASARKAN ROLE
      if (user.role === 'admin') {
        window.location.href = 'admin-dashboard.html';
        return;
      }
      if (user.role === 'developer') {
        window.location.href = 'developer-dashboard.html';
        return;
      }
      
      document.getElementById('userName').textContent = user.name || user.username;
      document.getElementById('welcomeMessage').textContent = `Halo, ${user.name || user.username}!`;
      
      await loadVisitorStats();
    }

    async function loadVisitorStats() {
      try {
        const res = await fetch(`${API_URL}/api/stats`);
        const data = await res.json();
        if (data.success) {
          document.getElementById('totalVisitors').textContent = data.totalVisitors || 1247;
          document.getElementById('todayVisitors').textContent = Math.floor((data.totalVisitors || 1247) * 0.3);
        }
      } catch (err) {
        document.getElementById('totalVisitors').textContent = '1,247';
        document.getElementById('todayVisitors').textContent = '89';
      }
    }

    function logout() {
      if (confirm('Yakin ingin logout?')) {
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      }
    }

    checkAuth();
    setInterval(loadVisitorStats, 30000);
  </script>
</body>
</html>
