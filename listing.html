    .let5 { animation-delay: 0.5s; }
    .let6 { animation-delay: 0.6s; }
    .let7 { animation-delay: 0.7s; }
    
    @keyframes loading-wave {
      0%, 100% { 
        transform: translateY(0) scale(1); 
        color: #fff;
      }
      50% { 
        transform: translateY(-18px) scale(1.15); 
        color: #34d399;
      }
    }

  <!-- Advanced Scroll Animations (Framer-like) -->
  <script>
    function initScrollAnimations() {
      const animatedElements = document.querySelectorAll('[data-scroll]');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, index) => {
          if (entry.isIntersecting) {
            const el = entry.target;
            const animation = el.dataset.scroll || 'fade-up';
            const delay = parseInt(el.dataset.delay) || (index * 80);
            
            setTimeout(() => {
              el.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
              el.style.transitionDelay = `${delay}ms`;
              
              if (animation === 'fade-up') {
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
              } else if (animation === 'fade-left') {
                el.style.opacity = '1';
                el.style.transform = 'translateX(0)';
              } else if (animation === 'fade-right') {
                el.style.opacity = '1';
                el.style.transform = 'translateX(0)';
              } else if (animation === 'scale') {
                el.style.opacity = '1';
                el.style.transform = 'scale(1)';
              }
              
              if (el.dataset.stagger) {
                const children = el.children;
                Array.from(children).forEach((child, i) => {
                  child.style.transition = 'all 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
                  child.style.transitionDelay = `${i * 120}ms`;
                  child.style.opacity = '1';
                  child.style.transform = 'translateY(0)';
                });
              }
            }, 50);
            
            observer.unobserve(el);
          }
        });
      }, { threshold: 0.15, rootMargin: '0px 0px -80px 0px' });

      animatedElements.forEach(el => {
        const animation = el.dataset.scroll || 'fade-up';
        if (animation === 'fade-up') { el.style.opacity = '0'; el.style.transform = 'translateY(60px)'; }
        else if (animation === 'fade-left') { el.style.opacity = '0'; el.style.transform = 'translateX(-60px)'; }
        else if (animation === 'fade-right') { el.style.opacity = '0'; el.style.transform = 'translateX(60px)'; }
        else if (animation === 'scale') { el.style.opacity = '0'; el.style.transform = 'scale(0.85)'; }
        observer.observe(el);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      initScrollAnimations();
    });
    window.addEventListener('pageshow', () => {
      setTimeout(() => initScrollAnimations(), 100);
    });
  </script>
