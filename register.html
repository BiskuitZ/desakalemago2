<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun - Desa Kalemago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-emerald-900 via-emerald-800 to-emerald-950 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md px-6">
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <img src="fotokkn/logokabposo.png" alt="Logo Kabupaten Poso" class="w-24 h-24 object-contain">
      </div>
      <h1 class="text-3xl font-bold text-white">Daftar Akun</h1>
      <p class="text-emerald-300 mt-2">Website Resmi Desa Kalemago</p>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <form id="registerForm" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-user mr-2 text-emerald-600"></i>Nama Lengkap
          </label>
          <input type="text" id="name" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
                 placeholder="Nama Lengkap Anda">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-at mr-2 text-emerald-600"></i>Username
          </label>
          <input type="text" id="username" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
                 placeholder="Username unik">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-lock mr-2 text-emerald-600"></i>Password
          </label>
          <input type="password" id="password" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
                 placeholder="Minimal 6 karakter">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-lock mr-2 text-emerald-600"></i>Konfirmasi Password
          </label>
          <input type="password" id="confirmPassword" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
                 placeholder="Ulangi password">
        </div>

        <div id="messageBox" class="hidden px-4 py-3 rounded-2xl text-sm"></div>

        <button type="submit" id="registerBtn"
                class="w-full bg-emerald-700 hover:bg-emerald-800 text-white py-4 rounded-2xl font-bold text-lg transition flex items-center justify-center gap-3 shadow-lg">
          <i class="fas fa-user-plus"></i>
          <span>Daftar Sekarang</span>
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
          Sudah punya akun? 
          <a href="login.html" class="text-emerald-600 hover:text-emerald-700 font-semibold">Login di sini</a>
        </p>
      </div>
    </div>

    <div class="text-center mt-6">
      <a href="index.html" class="text-emerald-300 hover:text-white transition flex items-center justify-center gap-2 text-sm">
        <i class="fas fa-arrow-left"></i>
        <span>Kembali ke Beranda</span>
      </a>
    </div>
  </div>

  <script>
    const API_URL = 'https://desakalemago2-backend-production.up.railway.app/api/auth/register';

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const registerBtn = document.getElementById('registerBtn');
      const messageBox = document.getElementById('messageBox');

      messageBox.classList.add('hidden');
      messageBox.className = 'hidden px-4 py-3 rounded-2xl text-sm';

      if (password !== confirmPassword) {
        messageBox.textContent = 'Password dan konfirmasi password tidak sama!';
        messageBox.classList.remove('hidden');
        messageBox.classList.add('bg-red-100', 'border', 'border-red-400', 'text-red-700');
        return;
      }

      if (password.length < 6) {
        messageBox.textContent = 'Password minimal 6 karakter!';
        messageBox.classList.remove('hidden');
        messageBox.classList.add('bg-red-100', 'border', 'border-red-400', 'text-red-700');
        return;
      }

      registerBtn.disabled = true;
      registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Memproses...';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, name })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('user', JSON.stringify(data.user));
          messageBox.textContent = 'Registrasi berhasil! Mengarahkan ke dashboard...';
          messageBox.classList.remove('hidden');
          messageBox.classList.add('bg-green-100', 'border', 'border-green-400', 'text-green-700');
          
          setTimeout(() => {
            window.location.href = 'admin-dashboard.html';
          }, 1500);
        } else {
          messageBox.textContent = data.message || 'Registrasi gagal';
          messageBox.classList.remove('hidden');
          messageBox.classList.add('bg-red-100', 'border', 'border-red-400', 'text-red-700');
          registerBtn.disabled = false;
          registerBtn.innerHTML = '<i class="fas fa-user-plus mr-2"></i> Daftar Sekarang';
        }
      } catch (error) {
        messageBox.textContent = 'Tidak dapat terhubung ke server. Pastikan backend berjalan di https://desakalemago2-backend-production.up.railway.app';
        messageBox.classList.remove('hidden');
        messageBox.classList.add('bg-red-100', 'border', 'border-red-400', 'text-red-700');
        registerBtn.disabled = false;
        registerBtn.innerHTML = '<i class="fas fa-user-plus mr-2"></i> Daftar Sekarang';
      }
    });
  </script>
</body>
</html>
