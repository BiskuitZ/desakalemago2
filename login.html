<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Desa Kalemago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-emerald-900 via-emerald-800 to-emerald-950 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md px-6">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <img src="fotokkn/logokabposo.png" alt="Logo Kabupaten Poso" class="w-24 h-24 object-contain">
      </div>
      <h1 class="text-3xl font-bold text-white">Login Admin</h1>
      <p class="text-emerald-300 mt-2">Website Resmi Desa Kalemago</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <form id="loginForm" class="space-y-6">
        <!-- Username -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-user mr-2 text-emerald-600"></i>Username
          </label>
          <input type="text" id="username" value="admin" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition">
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-lock mr-2 text-emerald-600"></i>Password
          </label>
          <input type="password" id="password" value="admin123" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition">
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-2xl text-sm">
        </div>

        <!-- Submit Button -->
        <button type="submit" id="loginBtn"
                class="w-full bg-emerald-700 hover:bg-emerald-800 text-white py-4 rounded-2xl font-bold text-lg transition flex items-center justify-center gap-3 shadow-lg">
          <i class="fas fa-sign-in-alt"></i>
          <span>Login</span>
        </button>
      </form>

      <!-- Default Credentials Info -->
      <div class="mt-6 p-4 bg-emerald-50 rounded-2xl border border-emerald-200">
        <p class="text-xs text-emerald-700 text-center">
          <i class="fas fa-info-circle mr-1"></i>
          <strong>Default:</strong> admin / admin123
        </p>
      </div>
    </div>

    <!-- Back to Home -->
    <div class="text-center mt-6">
      <a href="index.html" class="text-emerald-300 hover:text-white transition flex items-center justify-center gap-2 text-sm">
        <i class="fas fa-arrow-left"></i>
        <span>Kembali ke Beranda</span>
      </a>
    </div>
  </div>

  <script>
    const API_URL = 'https://desakalemago2-backend-production.up.railway.app/api/auth/login';

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('errorMessage');

      // Reset error
      errorDiv.classList.add('hidden');
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Memproses...';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          // Simpan token dan user info
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          // Redirect ke dashboard
          window.location.href = 'admin-dashboard.html';
        } else {
          // Tampilkan error
          errorDiv.textContent = data.message || 'Login gagal';
          errorDiv.classList.remove('hidden');
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> Login';
        }
      } catch (error) {
        console.error('Login error:', error);
        errorDiv.textContent = 'Tidak dapat terhubung ke server. Pastikan backend berjalan di https://desakalemago2-backend-production.up.railway.app';
        errorDiv.classList.remove('hidden');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> Login';
      }
    });

    // Cek apakah sudah login
    if (localStorage.getItem('token')) {
      window.location.href = 'admin-dashboard.html';
    }
  </script>
</body>
</html>
